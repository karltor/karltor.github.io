<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karls Projekt</title>
    <style>
        :root {
            --bg: #f8f9fa;
            --text: #212529;
            --accent: #007bff;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 40px 0;
        }

        h1 { margin-bottom: 10px; }

        /* Sektion för huvudportalen */
        .featured {
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 40px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .featured a {
            display: inline-block;
            background: white;
            color: #007bff;
            padding: 10px 25px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 15px;
            transition: transform 0.2s;
        }

        .featured a:hover { transform: scale(1.05); }

        /* Grid för övriga projekt */
        .repo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .repo-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            border-left: 5px solid var(--accent);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: translateY 0.2s;
            display: flex;
            flex-direction: column;
        }

        .repo-card:hover { transform: translateY(-5px); }

        .repo-card h3 { margin-top: 0; font-size: 1.2rem; }
        .repo-card p { font-size: 0.9rem; flex-grow: 1; color: #666; }
        
        .repo-link {
            text-decoration: none;
            color: var(--accent);
            font-weight: bold;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .loading { text-align: center; font-style: italic; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Karls Digitala Klassrum</h1>
        <p>Utforska simuleringar, spel och verktyg för undervisning.</p>
    </header>

    <section class="featured">
        <h2>🚀 Simuleringar & Verktyg</h2>
        <p>Här hittar du hela biblioteket med interaktiva simuleringar för Fysik, Kemi, Biologi och Matte.</p>
        <a href="https://karltor.github.io/Simuleringar/">Öppna Portalen</a>
    </section>

    <h2>Övriga Projekt</h2>
    <div id="repo-list" class="repo-grid">
        <p class="loading">Hämtar projekt från GitHub...</p>
    </div>
</div>

<script>
    const USERNAME = 'karltor';
    
    // BLACKLIST: Lägg till namnen på de repon du vill dölja här
    const blacklist = [
        'Lock-and-Key', 
        'Simuleringar', 
        'karltor.github.io' // Ofta vill man dölja själva källkods-repot för sidan
    ];

    async function fetchRepos() {
        const repoList = document.getElementById('repo-list');
        
        try {
            const response = await fetch(`https://api.github.com/users/${USERNAME}/repos?sort=updated`);
            const repos = await response.json();
            
            repoList.innerHTML = ''; // Rensa "Loading..."

            // Filtrera bort repon i blacklist
            const filteredRepos = repos.filter(repo => !blacklist.includes(repo.name));

            filteredRepos.forEach(repo => {
                const card = document.createElement('div');
                card.className = 'repo-card';
                
                // Formatera namnet lite snyggare (ersätt bindestreck med mellanslag)
                const displayName = repo.name.replace(/-/g, ' ');
                
                card.innerHTML = `
                    <h3>${displayName}</h3>
                    <p>${repo.description || 'Ingen beskrivning tillgänglig.'}</p>
                    <a class="repo-link" href="${repo.homepage || repo.html_url}" target="_blank">
                        Visa projekt →
                    </a>
                `;
                repoList.appendChild(card);
            });

        } catch (error) {
            console.error('Fel vid hämtning:', error);
            repoList.innerHTML = '<p>Kunde inte ladda projekten just nu.</p>';
        }
    }

    fetchRepos();
</script>

</body>
</html>
