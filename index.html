<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karls Projekt</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #24292f;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 { font-size: 24px; border-bottom: 1px solid #d0d7de; padding-bottom: 10px; }

        .repo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }

        .repo-card {
            border: 1px solid #d0d7de;
            border-radius: 6px;
            padding: 16px;
            text-decoration: none;
            color: inherit;
            transition: background 0.1s;
        }

        .repo-card:hover {
            background-color: #f6f8fa;
            border-color: #0969da;
        }

        .repo-card h3 {
            margin: 0 0 8px 0;
            font-size: 16px;
            color: #0969da;
        }

        .repo-card p {
            margin: 0;
            font-size: 12px;
            color: #57606a;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Mina Projekt</h1>
    <div id="repo-list" class="repo-grid">
        </div>
</div>

<script>
    const USERNAME = 'karltor';
    
    // BLACKLIST: Här lägger du de repon du INTE vill se på startsidan
    const blacklist = [
        'Lock-and-Key',
        'karltor.github.io'
    ];

    async function fetchRepos() {
        const repoList = document.getElementById('repo-list');
        
        try {
            const response = await fetch(`https://api.github.com/users/${USERNAME}/repos?sort=updated&per_page=100`);
            const repos = await response.json();
            
            repoList.innerHTML = ''; 

            // Filtrera med blacklist
            const filteredRepos = repos.filter(repo => !blacklist.includes(repo.name));

            filteredRepos.forEach(repo => {
                const card = document.createElement('a');
                card.className = 'repo-card';
                card.href = repo.homepage || repo.html_url;
                card.target = "_blank";
                
                card.innerHTML = `
                    <h3>${repo.name}</h3>
                    <p>${repo.description || 'Ingen beskrivning.'}</p>
                `;
                repoList.appendChild(card);
            });

        } catch (error) {
            repoList.innerHTML = '<p>Kunde inte ladda projekt.</p>';
        }
    }

    fetchRepos();
</script>

</body>
</html>
